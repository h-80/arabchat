<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRAQ Chat | عراق جات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --wa-green: #075e54; 
            --wa-action: #00a884;
            --tt-red: #fe2c55; 
            --msg-me-bg: #e2ffc7; 
            --msg-them-bg: #ffffff; 
            --my-name-color: #fe2c55; 
            --others-name-color: #075e54;
        }

        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #fff; overflow: hidden; }

        /* الهيدر ثابت ويحتوي على أيقونة الرسائل */
        .main-header { position: sticky; top: 0; background: var(--wa-green); color: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header-user-group { display: flex; align-items: center; gap: 15px; }
        
        /* أيقونة الرسائل الواردة */
        #private-notify { font-size: 24px; cursor: pointer; display: none; position: relative; }
        .notify-dot { position: absolute; top: -2px; right: -2px; width: 11px; height: 11px; background: #ff0000; border-radius: 50%; border: 1.5px solid white; }
        
        .user-mini-img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; cursor: pointer; }

        #lobby-screen { display: block; height: 100vh; overflow-y: auto; padding-bottom: 80px; }
        .section-header { padding: 15px 15px 5px; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 15px; font-weight: 900; color: #333; border-right: 4px solid var(--wa-action); padding-right: 8px; margin: 0; }
        .lobby-btns { display: flex; gap: 8px; }
        .btn-lobby { border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }

        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; }
        .room-card-square { position: relative; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; cursor: pointer; border: 1px solid #f0f0f0; }
        .room-card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .room-card-info { padding: 8px; text-align: center; font-weight: 700; font-size: 13px; }
        .del-room-btn { position: absolute; top: 5px; left: 5px; background: var(--tt-red); color: #fff; border: none; width: 24px; height: 24px; border-radius: 50%; z-index: 10; font-size: 10px; }

        #chat-screen { display: none; height: 100vh; flex-direction: column; background: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .chat-header { background: var(--wa-green); color: #fff; padding: 12px; display: flex; align-items: center; gap: 10px; }
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* تصميم الفقاعات - الجميع يمين */
        .msg-row { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; align-self: flex-start; }
        .u-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .msg-content { display: flex; flex-direction: column; }
        .u-name { font-size: 11px; font-weight: 900; margin-bottom: 2px; padding-right: 4px; }
        .u-name.is-me { color: var(--my-name-color); }
        .u-name.is-them { color: var(--others-name-color); }

        .bubble { padding: 8px 12px; font-size: 14px; font-weight: 600; border-radius: 12px; border-top-right-radius: 2px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble.me { background: var(--msg-me-bg); }
        .bubble.them { background: var(--msg-them-bg); }
        .bubble::after { content: ''; position: absolute; top: 0; right: -7px; width: 0; height: 0; border: 8px solid transparent; border-top-color: inherit; border-left-color: inherit; }

        .input-bar { padding: 8px; display: flex; align-items: center; gap: 8px; background: #f0f0f0; }
        .input-wrapper { background: #fff; flex: 1; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; min-height: 44px; }
        #m-in { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; }
        #sticker-panel { display: none; background: #fff; padding: 10px; grid-template-columns: repeat(6, 1fr); gap: 10px; border-top: 1px solid #ddd; max-height: 140px; overflow-y: auto; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 5000; align-items: center; justify-content: center; }
        .modal-card { background: #fff; width: 88%; max-width: 320px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .inbox-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .btn-p { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 700; margin-top: 8px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="main-header">
            <span style="font-weight:900; font-size:18px;">عراق جات</span>
            <div class="header-user-group">
                <div id="private-notify" onclick="openInbox()">📩<span class="notify-dot"></span></div>
                <img id="header-user-img" src="" class="user-mini-img" onclick="viewProfile(myUser.name, myUser.uid, myUser.img)">
            </div>
        </div>
        
        <div class="section-header">
            <h2 class="section-title">الغرف العامة</h2>
            <div class="lobby-btns">
                <button class="btn-lobby" style="background:var(--wa-action); color:#fff;" onclick="showModal('modal-create')">+ إنشاء غرفة</button>
                <button class="btn-lobby" style="background:#555; color:#fff;" onclick="logout()">خروج</button>
            </div>
        </div>
        <div id="public-rooms" class="rooms-grid"></div>
        
        <div class="section-header"><h2 class="section-title">الغرف النشطة</h2></div>
        <div id="user-rooms" class="rooms-grid"></div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <span onclick="goBack()" style="cursor:pointer; font-size:24px;">🔙</span>
            <div id="room-title" style="flex:1; text-align:center; font-weight:900;">...</div>
        </div>
        <div id="msg-container"></div>
        <div id="sticker-panel"></div>
        <div class="input-bar">
            <div class="input-wrapper">
                <span id="emoji-btn" style="cursor:pointer; font-size:22px; margin-left:8px;">😊</span>
                <input type="text" id="m-in" placeholder="اكتب رسالة..." autocomplete="off">
            </div>
            <button onclick="sendMsg()" style="background:var(--wa-action); border:none; width:44px; height:44px; border-radius:50%; color:#fff; cursor:pointer;">➤</button>
        </div>
    </div>

    <div id="modal-create" class="modal-overlay"><div class="modal-card">
        <h3 style="text-align:center; margin-top:0;">إنشاء غرفة</h3>
        <input type="text" id="new-room-name" placeholder="اسم الغرفة..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="file" accept="image/*" onchange="handleRoomFile(this)" style="font-size:12px; margin-bottom:15px;">
        <button class="btn-p" style="background:var(--wa-action); color:#fff;" onclick="saveRoom()">تأكيد</button>
        <button class="btn-p" onclick="hideModal('modal-create')">إلغاء</button>
    </div></div>

    <div id="modal-inbox" class="modal-overlay"><div class="modal-card">
        <h3 style="text-align:center; margin-top:0;">الرسائل الواردة</h3>
        <div id="inbox-list" style="max-height: 300px; overflow-y: auto;"></div>
        <button class="btn-p" style="background:#eee;" onclick="hideModal('modal-inbox')">إغلاق</button>
    </div></div>

    <div id="modal-profile" class="modal-overlay"><div class="modal-card" style="text-align:center;">
        <img id="p-img" src="" style="width:85px; height:85px; border-radius:50%; object-fit:cover; border:2px solid #00a884;">
        <div id="p-name" style="font-weight:900; margin:15px 0; font-size:18px;"></div>
        <button id="msg-btn" class="btn-p" style="background:var(--wa-action); color:#fff;" onclick="openPrivateChat()">💬 مراسلة خاصة</button>
        <button id="block-btn" class="btn-p" style="background:var(--tt-red); color:#fff;" onclick="toggleBlock()">حظر المستخدم</button>
        <button class="btn-p" onclick="hideModal('modal-profile')">إلغاء</button>
    </div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCRnIF0BEIvf5axNd7S2CjGn1oBI5Ew4KI", authDomain: "tik-tak-cdfad.firebaseapp.com", projectId: "tik-tak-cdfad", databaseURL: "https://tik-tak-cdfad-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myUser = { uid: localStorage.getItem('iraq_uid') || "U" + Date.now(), name: localStorage.getItem('iraq_name') || "زائر", img: localStorage.getItem('user_img') || "" };
        let currentRoomId = "", roomImgBase = "", targetUser = null;
        let activePrivates = {};
        let blockedList = JSON.parse(localStorage.getItem('iraq_blocked') || "[]");
        const emojis = ['😂','❤️','🇮🇶','😍','🌹','🔥','😎','👍','✨','😢','👋','💔','🤐','🤣','🙄','🆗'];

        function setupApp() {
            if(!localStorage.getItem('iraq_uid')) localStorage.setItem('iraq_uid', myUser.uid);
            document.getElementById('header-user-img').src = myUser.img || `https://api.dicebear.com/7.x/avataaars/svg?seed=${myUser.name}`;
            loadPublicRooms(); loadUserRooms(); listenForPrivates(); initEmojis();
        }

        function initEmojis() {
            const p = document.getElementById('sticker-panel');
            p.innerHTML = emojis.map(e => `<span style="font-size:24px; cursor:pointer;" onclick="addEmoji('${e}')">${e}</span>`).join('');
            document.getElementById('emoji-btn').onclick = () => p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        }
        function addEmoji(e) { document.getElementById('m-in').value += e; }

        // مراقبة الرسائل الخاصة لإظهار زر 📩
        function listenForPrivates() {
            db.ref('chats').on('value', snap => {
                let hasNew = false;
                snap.forEach(roomSnap => {
                    const rid = roomSnap.key;
                    if(rid.startsWith('private_') && rid.includes(myUser.uid)) {
                        const msgs = roomSnap.val();
                        const lastMsg = Object.values(msgs).pop();
                        if(lastMsg && lastMsg.uid !== myUser.uid) {
                            activePrivates[lastMsg.uid] = { name: lastMsg.u, img: lastMsg.img, roomId: rid };
                            if(currentRoomId !== rid) hasNew = true;
                        }
                    }
                });
                document.getElementById('private-notify').style.display = hasNew ? 'block' : 'none';
            });
        }

        function openInbox() {
            const list = document.getElementById('inbox-list'); list.innerHTML = "";
            const keys = Object.keys(activePrivates);
            if(keys.length === 0) list.innerHTML = "<p style='text-align:center; color:#999;'>لا توجد رسائل واردة</p>";
            keys.forEach(uid => {
                const u = activePrivates[uid];
                list.innerHTML += `<div class="inbox-item" onclick="enterRoom('${u.roomId}','خاص: ${u.name}')">
                    <img src="${u.img || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+u.name}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <b style="font-size:14px;">${u.name}</b></div>`;
            });
            showModal('modal-inbox');
        }

        function loadMessages() {
            db.ref('chats/'+currentRoomId).off();
            db.ref('chats/'+currentRoomId).limitToLast(50).on('value', snap => {
                const box = document.getElementById('msg-container'); box.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val(); if(blockedList.includes(d.uid)) return;
                    const isMe = d.uid === myUser.uid;
                    box.innerHTML += `<div class="msg-row">
                        <img src="${d.img || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+d.u}" class="u-avatar" onclick="viewProfile('${d.u}','${d.uid}','${d.img||""}')">
                        <div class="msg-content">
                            <span class="u-name ${isMe ? 'is-me' : 'is-them'}">${d.u} ${isMe ? '(أنت)' : ''}</span>
                            <div class="bubble ${isMe ? 'me' : 'them'}">${d.m}</div>
                        </div>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-in');
            if(i.value.trim()) {
                db.ref('chats/'+currentRoomId).push({ u: myUser.name, uid: myUser.uid, m: i.value, img: myUser.img, t: Date.now() });
                i.value = ""; document.getElementById('sticker-panel').style.display = 'none';
            }
        }

        function enterRoom(id, name) {
            currentRoomId = id; document.getElementById('room-title').innerText = name;
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            hideModal('modal-inbox');
            loadMessages();
        }

        function loadPublicRooms() {
            document.getElementById('public-rooms').innerHTML = `<div class="room-card-square" onclick="enterRoom('pub_iq','دردشة العراق 🇮🇶')">
                <img src="https://flagpedia.net/data/flags/w580/iq.png" class="room-card-img"><div class="room-card-info">دردشة العراق 🇮🇶</div>
            </div>`;
        }

        function loadUserRooms() {
            db.ref('rooms_meta').on('value', snap => {
                const box = document.getElementById('user-rooms'); box.innerHTML = "";
                snap.forEach(c => {
                    const r = c.val();
                    if (r && r.name) { // إخفاء أي شيء undefined
                        box.innerHTML += `<div class="room-card-square" onclick="enterRoom('${c.key}','${r.name}')">
                            ${r.uid === myUser.uid ? `<button class="del-room-btn" onclick="deleteRoom(event,'${c.key}')">🗑️</button>` : ''}
                            <img src="${r.img || 'https://via.placeholder.com/150'}" class="room-card-img"><div class="room-card-info">${r.name}</div>
                        </div>`;
                    }
                });
            });
        }

        function saveRoom() {
            const n = document.getElementById('new-room-name').value;
            if(n.trim()) {
                db.ref('rooms_meta').push({ name: n, uid: myUser.uid, img: roomImgBase || "https://via.placeholder.com/150", t: Date.now() });
                hideModal('modal-create'); document.getElementById('new-room-name').value = "";
            }
        }

        function handleRoomFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => roomImgBase = e.target.result;
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function deleteRoom(e, id) { e.stopPropagation(); if(confirm("حذف الغرفة؟")) db.ref('rooms_meta/'+id).remove(); }
        
        function viewProfile(name, uid, img) {
            targetUser = { name, uid, img };
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-img').src = img || `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
            const isMe = uid === myUser.uid;
            document.getElementById('msg-btn').style.display = isMe ? 'none' : 'block';
            document.getElementById('block-btn').style.display = isMe ? 'none' : 'block';
            document.getElementById('block-btn').innerText = blockedList.includes(uid) ? "إلغاء الحظر" : "حظر المستخدم";
            showModal('modal-profile');
        }

        function toggleBlock() {
            if(blockedList.includes(targetUser.uid)) blockedList = blockedList.filter(i => i !== targetUser.uid);
            else blockedList.push(targetUser.uid);
            localStorage.setItem('iraq_blocked', JSON.stringify(blockedList));
            location.reload();
        }

        function openPrivateChat() {
            const pId = myUser.uid < targetUser.uid ? `private_${myUser.uid}_${targetUser.uid}` : `private_${targetUser.uid}_${myUser.uid}`;
            hideModal('modal-profile'); enterRoom(pId, `خاص: ${targetUser.name}`);
        }

        function logout() { if(confirm("تسجيل الخروج؟")) { localStorage.clear(); location.reload(); } }
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
        function goBack() { 
            document.getElementById('lobby-screen').style.display = 'block'; 
            document.getElementById('chat-screen').style.display = 'none'; 
            currentRoomId = ""; 
            db.ref('chats').off(); 
        }
        
        setupApp();
    </script>
</body>
</html>
